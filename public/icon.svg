<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Water gradient -->
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Hull gradient -->
    <linearGradient id="hull" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>

    <!-- Gauge gradient -->
    <linearGradient id="fuel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <!-- Inner glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Glass panel -->
  <rect x="36" y="36" width="440" height="440" rx="90"
        fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>

  <!-- Waves -->
  <path d="M60 380 Q130 360 200 380 Q270 400 340 380 Q410 360 460 380"
        stroke="url(#water)" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M70 410 Q140 392 210 410 Q280 428 350 410 Q420 392 450 410"
        stroke="#7dd3fc" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Ship group -->
  <g filter="url(#shadow)">
    <!-- Hull -->
    <path d="M85 310 L165 250 L256 230 L347 250 L427 310
             L395 372 Q256 415 117 372 Z"
          fill="url(#hull)"/>

    <!-- Deck -->
    <rect x="198" y="185" width="116" height="70" rx="10"
          fill="#38bdf8" opacity="0.95"/>

    <!-- Bridge highlight -->
    <rect x="205" y="192" width="102" height="20" rx="6"
          fill="rgba(255,255,255,0.25)"/>

    <!-- Smokestack -->
    <rect x="244" y="132" width="32" height="55" rx="7"
          fill="#7dd3fc"/>

    <!-- Smoke -->
    <circle cx="248" cy="118" r="10" fill="#94a3b8" opacity="0.6"/>
    <circle cx="265" cy="103" r="8" fill="#94a3b8" opacity="0.4"/>
    <circle cx="280" cy="90" r="6" fill="#94a3b8" opacity="0.25"/>
  </g>

  <!-- Fuel gauge (glass card style) -->
  <g filter="url(#shadow)">
    <circle cx="380" cy="150" r="60" fill="rgba(30,41,59,0.9)"
            stroke="rgba(56,189,248,0.8)" stroke-width="4"/>

    <!-- Gauge arc -->
    <path d="M380 150 L380 100 A50 50 0 0 1 428 178 Z"
          fill="url(#fuel)" opacity="0.95"/>

    <!-- Inner highlight -->
    <circle cx="380" cy="150" r="38" fill="rgba(255,255,255,0.04)"/>

    <!-- Needle -->
    <line x1="380" y1="150" x2="410" y2="120"
          stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>

    <!-- Center cap -->
    <circle cx="380" cy="150" r="10" fill="#0ea5e9" filter="url(#glow)"/>
  </g>
</svg>